name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-submission:
    name: Validate Submission
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Run validation
        run: node scripts/validate-submission.js

  build-and-deploy:
    name: Build Gallery & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build gallery
        run: node scripts/build-gallery.js

      - name: Prepare publish dir
        run: |
          mkdir -p _site
          cp index.html git-guide.html _site/
          cp -r submissions _site/submissions
          cp -r assets _site/assets

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
